<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="content">
      <div class="sidebar">
        <h2 class="sidebar-el">Projects</h2>
        <div class="projects"></div>
        <button class="add-project-button">+</button>
        <dialog class="project-dialog">
          <form method="dialog" class="project-form">
            <label for="project-name">Project Name: </label>
            <input type="text" name="project-title" id="project-title" />
            <button class="close-project">Close</button>
            <button class="submit-project">Add Project</button>
          </form>
        </dialog>
      </div>
      <div class="main-todos">
        <div class="top-row">
          <h1 class="main-header">Inbox</h1>
          <button class="add-button">+ Add Task</button>
          <!--finish writing modal/form and make it on click in js-->
          <dialog class="task-dialog">
            <form method="dialog" class="task-form">
              <div class="form-els">
                <div class="task-title">
                  <label for="title">Title: </label>
                  <input type="text" name="title" id="title" required />
                </div>
                <div class="task-desc">
                  <label for="description">Description: </label>
                  <textarea
                    name="description"
                    id="description"
                    placeholder="Enter your description here..."
                    required
                  ></textarea>
                </div>
                <div class="task-due-date">
                  <label for="due-date">Due Date: </label>
                  <input type="date" name="due-date" id="due-date" required />
                </div>
                <div class="task-priority">
                  <label for="priority">Priority: </label>
                  <label for="low">Low</label>
                  <input
                    type="radio"
                    name="priority"
                    id="low"
                    value="low"
                    required
                  />

                  <label for="medium">Medium</label>
                  <input
                    type="radio"
                    name="priority"
                    id="medium"
                    value="medium"
                  />

                  <label for="high">High</label>
                  <input
                    type="radio"
                    name="priority"
                    id="high"
                    value="high"
                    required
                  />
                </div>
                <button type="button" class="close-modal">Close</button>
                <button type="submit" class="submit-modal">Add Task</button>
              </div>
            </form>
          </dialog>
        </div>
        <div class="tasks">
          <!--
          <button class="task">
            <div class="task-text">
              <h3>Task Title</h3>
              <h5 class="task-desc">
                Task Description that is extremly long my my my my. my how logn
                is this howefhouwhguow w jwbuohwguoehugoerhguiebgije ge gbio
              </h5>
            </div>
            <div class="other-task-info">
              <p>Due Date</p>
              <p>Priority Level</p>
            </div>
          </button>
          -->
        </div>
      </div>
    </div>
  </body>
</html>
